<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Mastery Quiz</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>

:root {
  --bg:#f7f6f2;
  --surface:#f9f8f5;
  --surface2:#fbfbf9;
  --surface-off:#f3f0ec;
  --surface-dyn:#e6e4df;
  --div:#dcd9d5;
  --border:#d4d1ca;
  --text:#28251d;
  --muted:#7a7974;
  --primary:#01696f;
  --primary-h:#0c4e54;
  --primary-hl:#cedcd8;
  --r-lg:.75rem;
  --r-xl:1rem;
  --r-full:9999px;
}

body{
  min-height:100vh;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  margin:0;
}

.app{
  max-width:700px;
  margin:0 auto;
  padding:40px 20px;
}

button{
  cursor:pointer;
}

.card{
  background:white;
  padding:30px;
  border-radius:16px;
  border:1px solid #ddd;
}

.btn-primary{
  background:#01696f;
  color:white;
  border:none;
  padding:12px 28px;
  border-radius:10px;
  font-size:16px;
}

.q-text{
  font-size:28px;
  margin-bottom:20px;
}

.opts{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.opt-btn{
  padding:14px;
  border:2px solid #ddd;
  border-radius:10px;
  background:white;
  text-align:left;
}

.opt-btn.selected{
  border-color:#01696f;
  background:#e9f6f5;
}

.screen{
  display:none;
}

.screen.active{
  display:block;
}

</style>
</head>

<body>

<!-- PASSWORD SCREEN -->
<div id="passwordScreen" style="
position:fixed;
inset:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
">

<div style="
background:white;
padding:35px;
border-radius:14px;
width:320px;
text-align:center;
">

<h2 style="margin-bottom:20px;">Enter Password</h2>

<input 
type="password" 
id="quizPassword"
placeholder="Enter Password"
style="
width:100%;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:15px;
box-sizing:border-box;
">

<button 
id="loginBtn"
style="
width:100%;
padding:12px;
background:#01696f;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
">
Access Quiz
</button>

<p id="passError" style="
color:red;
display:none;
margin-top:12px;
">
Wrong Password
</p>

</div>
</div>

<div class="app">

<!-- INTRO -->
<div class="screen active" id="screenIntro">

<div class="card">

<h1>AI Mastery Quiz</h1>

<p>
Answer questions and discover your AI mastery level.
</p>

<br>

<button class="btn-primary" id="btnStart">
Start Quiz
</button>

</div>

</div>

<!-- QUIZ -->
<div class="screen" id="screenQuiz">

<div class="card">

<h2 class="q-text" id="qText"></h2>

<div class="opts" id="qOpts"></div>

<br>

<button class="btn-primary" id="btnNext" disabled>
Next
</button>

</div>

</div>

<!-- RESULT -->
<div class="screen" id="screenResult">

<div class="card">

<h1>Your Result</h1>

<h2 id="resTitle"></h2>

<p id="resDesc"></p>

<br>

<button class="btn-primary" id="btnRetry">
Retake Quiz
</button>

</div>

</div>

</div>

<script>

/* PASSWORD */

document.getElementById("loginBtn").onclick = function(){

  var password = document.getElementById("quizPassword").value;

  if(password === "Bingo"){

    document.getElementById("passwordScreen").style.display = "none";

  }else{

    document.getElementById("passError").style.display = "block";

  }

};


/* QUIZ DATA */

var QS = [

{
q:"How often do you use AI tools?",
opts:[
"Rarely",
"Sometimes",
"Daily",
"For everything"
]
},

{
q:"Have you used AI for automation?",
opts:[
"No",
"A little",
"Yes",
"Advanced workflows"
]
},

{
q:"How many AI tools do you use?",
opts:[
"1",
"2-3",
"4-6",
"Many"
]
}

];

var RESULTS = [

{
title:"Beginner",
desc:"You are starting your AI journey."
},

{
title:"Intermediate",
desc:"You understand AI and use it productively."
},

{
title:"Advanced",
desc:"You are highly skilled with AI systems."
},

{
title:"AI Expert",
desc:"You are among the top AI power users."
}

];


/* QUIZ LOGIC */

var currentQ = 0;
var score = 0;
var selected = -1;

function showScreen(id){

  document.getElementById("screenIntro").classList.remove("active");
  document.getElementById("screenQuiz").classList.remove("active");
  document.getElementById("screenResult").classList.remove("active");

  document.getElementById(id).classList.add("active");

}

function renderQuestion(){

  selected = -1;

  var q = QS[currentQ];

  document.getElementById("qText").textContent = q.q;

  var container = document.getElementById("qOpts");

  container.innerHTML = "";

  for(let i=0;i<q.opts.length;i++){

    var btn = document.createElement("button");

    btn.className = "opt-btn";

    btn.textContent = q.opts[i];

    btn.onclick = function(){

      selected = i;

      var all = document.querySelectorAll(".opt-btn");

      all.forEach(function(b){
        b.classList.remove("selected");
      });

      btn.classList.add("selected");

      document.getElementById("btnNext").disabled = false;

    };

    container.appendChild(btn);

  }

}

function startQuiz(){

  currentQ = 0;
  score = 0;

  showScreen("screenQuiz");

  renderQuestion();

}

function nextQuestion(){

  if(selected === -1) return;

  score += selected + 1;

  currentQ++;

  if(currentQ < QS.length){

    renderQuestion();

  }else{

    showResult();

  }

}

function showResult(){

  var level;

  if(score <= 4){

    level = RESULTS[0];

  }else if(score <= 7){

    level = RESULTS[1];

  }else if(score <= 10){

    level = RESULTS[2];

  }else{

    level = RESULTS[3];

  }

  document.getElementById("resTitle").textContent = level.title;

  document.getElementById("resDesc").textContent = level.desc;

  showScreen("screenResult");

}


/* BUTTONS */

document.getElementById("btnStart").onclick = startQuiz;

document.getElementById("btnNext").onclick = nextQuestion;

document.getElementById("btnRetry").onclick = function(){

  showScreen("screenIntro");

};

</script>

</body>
</html>
