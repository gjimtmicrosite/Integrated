<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Smart Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  overflow-x:hidden;
}

/* BACKGROUND GLOW */
body::before{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background:radial-gradient(circle,#00f2ff,transparent);
  top:-100px;
  left:-100px;
  filter:blur(150px);
}

body::after{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background:radial-gradient(circle,#ff00c8,transparent);
  bottom:-100px;
  right:-100px;
  filter:blur(150px);
}

/* LOGIN */
.login-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(25px);
  padding:35px;
  border-radius:20px;
  text-align:center;
  width:320px;
}

.login-box input, .login-box button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

.login-box button{
  background:linear-gradient(45deg,#ffd700,#ff9800);
  font-weight:bold;
  cursor:pointer;
}

.error{color:#ff4b4b;font-size:13px}

#dashboard{display:none;}

/* SIDEBAR */
.sidebar{
  width:250px;
  height:100vh;
  position:fixed;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  padding:20px;
}

.sidebar h2{
  color:#ffd700;
  margin-bottom:25px;
  font-size:22px;
  cursor:pointer;
}

.sidebar button{
  width:100%;
  margin:10px 0;
  padding:14px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
  cursor:pointer;
  transition:0.3s;
  text-align:left;
}

.sidebar button:hover{
  background:#ffd700;
  color:#000;
  transform:scale(1.05);
}

/* MAIN */
.main{
  margin-left:260px;
  padding:30px;
}

.header{
  font-size:28px;
  margin-bottom:25px;
}

.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  flex:1;
  min-width:250px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
}

/* MODAL */
.workshop-modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
}

.workshop-modal-content{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  color:#000;
  padding:30px;
  border-radius:15px;
  width:300px;
}

.modal-btn{
  width:100%;
  padding:10px;
  background:#ff9800;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h2>🔐 Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p class="error" id="error"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="sidebar">
    <h2 onclick="location.href='dashboard.html'">📊 Dashboards</h2>

    <button onclick="location.href='Career-result.html'">🎓 Career Quiz</button>
    <button onclick="location.href='skillx-result.html'">💼 SkillX Quiz</button>
    <button onclick="openWorkshopFilter()">📊 Workshop Filter</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>

  <div class="main">
    <div class="header">🚀 Smart Dashboard</div>

    <div class="cards">
      <div class="card">Career: <span id="careerCount">0</span></div>
      <div class="card">SkillX: <span id="skillCount">0</span></div>
      <div class="card">Total: <span id="totalCount">0</span></div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div id="workshopModal" class="workshop-modal">
  <div class="workshop-modal-content">
    <h3>Select Workshop</h3>

    <select id="workshopSelect">
      <option value="">Select</option>
      <option value="AI for Business Decision-Making">AI Business</option>
      <option value="Web Development">Web Dev</option>
      <option value="Vedic Maths">Vedic Maths</option>
    </select>

    <button class="modal-btn" onclick="goToWorkshop()">🚀 Go</button>
  </div>
</div>

<script>
// LOGIN
function login(){
  if(username.value==="admin" && password.value==="12345"){
    loginBox.style.display="none";
    dashboard.style.display="block";
    loadDashboard();
  } else {
    error.innerText="Invalid Login";
  }
}

function logout(){location.reload();}

// LOAD DATA
function loadDashboard(){
  careerCount.innerText=120;
  skillCount.innerText=80;
  totalCount.innerText=200;
}

// MODAL
function openWorkshopFilter(){
  workshopModal.style.display="block";
}

function goToWorkshop(){
  const selected = workshopSelect.value;

  const pages={
    "AI for Business Decision-Making":"https://gjimtmicrosite.github.io/Integrated/ai-business.html"
  };

  if(pages[selected]){
    window.open(pages[selected],"_blank");
  } else {
    alert("No page yet");
  }
}
</script>

</body>
</html>
