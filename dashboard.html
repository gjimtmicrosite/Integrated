<!DOCTYPE html>
<html>
<head>
  <title>Advanced Dashboard</title>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- DataTables -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a3663, #1e5aa8);
      color: #fff;
    }

    /* LOGIN */
    #login {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      text-align: center;
    }

    .login-box input {
      padding: 10px;
      width: 200px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    .login-box button {
      padding: 10px 20px;
      border: none;
      background: #d4af37;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      height: 100vh;
      position: fixed;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(20px);
      padding: 20px;
    }

    .sidebar h2 {
      color: #d4af37;
      margin-bottom: 20px;
    }

    .sidebar button {
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
    }

    .sidebar button:hover {
      background: #d4af37;
      color: #000;
      transform: scale(1.05);
    }

    .main {
      margin-left: 260px;
      padding: 30px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
    }

    /* TABLE */
    table.dataTable {
      color: white !important;
    }

    .dataTables_wrapper {
      color: white;
    }

    .dataTables_wrapper input,
    .dataTables_wrapper select {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid #ccc;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>🔐 Secure Dashboards</h2>
    <input type="password" id="pass" placeholder="Enter Password">
    <br>
    <button onclick="checkLogin()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="sidebar">
    <h2>📊 Dashboards</h2>
  
    <button onclick="showSection('ai')">🤖 AI Quiz</button>
    <button onclick="showSection('career')">🎓 Career Quiz</button>
  <a href="skillx-result.html">  <button>💼 SkillX Quiz</button></a>
    <button onclick="goHome()">🏠 Back to Home</button>
<button onclick="showHome()">🔓 Logout</button>
  </div>

  <div class="main">

    <!-- HOME -->
    <div id="dashboard">
      <h2>📈 Analytics</h2>

      <div class="card"><canvas id="aiChart"></canvas></div>
      <div class="card"><canvas id="careerChart"></canvas></div>
      <div class="card"><canvas id="skillChart"></canvas></div>
    </div>

    <!-- TABLE -->
    <div id="tableView" style="display:none;">
      <h2 id="tableTitle"></h2>
      <table id="dataTable" class="display" style="width:100%"></table>
    </div>

  </div>
</div>

<script>

let allData = {};

// 🔐 LOGIN
function checkLogin() {
  if (document.getElementById("pass").value === "admin123") {
    login.style.display = "none";
    app.style.display = "block";
    loadData();
  } else {
    alert("Wrong Password");
  }
}

// 📊 LOAD DATA
function loadData() {
  google.script.run.withSuccessHandler(res => {
    console.log("FULL RESPONSE:", res);

    if (!res) {
      alert("No response from server");
      return;
    }

    if (res.error) {
      alert("ERROR: " + res.error);
      return;
    }

    allData = res;

    createChart("aiChart", res.ai.length, "AI Quiz");
    createChart("careerChart", res.career.length, "Career Quiz");
    createChart("skillChart", res.skillx.length, "SkillX Quiz");

  }).getAllData();
}

// 📊 CHART
function createChart(id, value, label) {
  new Chart(document.getElementById(id), {
    type: 'bar',
    data: {
      labels: [label],
      datasets: [{
        label: "Students",
        data: [value],
        backgroundColor: "#d4af37"
      }]
    },
    options: {
      plugins: { legend: { display: false } }
    }
  });
}

// 📋 DATATABLE
function showSection(type) {
  dashboard.style.display = "none";
  tableView.style.display = "block";

  let data = allData[type];
  let table = $("#dataTable");

  // destroy old
  if ($.fn.DataTable.isDataTable("#dataTable")) {
    table.DataTable().destroy();
    table.empty();
  }

  if (!data || data.length === 0) {
    table.html("<tr><td>No Data Found</td></tr>");
    return;
  }

  let columns = Object.keys(data[0]).map(key => ({
    title: key,
    data: key
  }));

  table.DataTable({
    data: data,
    columns: columns,
    pageLength: 10,
    responsive: true
  });

  document.getElementById("tableTitle").innerText = type.toUpperCase() + " DATA";
}

// 🏠 HOME
function showHome() {
  window.location.href = "https://gjimtmicrosite.github.io/Integrated/dashboard.html";
}
  function goHome() {
  window.location.href = "https://gjimtmicrosite.github.io/Integrated/";
}

</script>

</body>
</html>
