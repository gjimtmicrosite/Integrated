<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Smart Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}

/* LOGIN */
.login-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.08);
  padding:30px;
  border-radius:20px;
  text-align:center;
}

.login-box input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

button{
  padding:10px;
  border:none;
  cursor:pointer;
}

/* DASHBOARD */
#dashboard{display:none;}

.sidebar{
  width:250px;
  position:fixed;
}

.main{
  margin-left:260px;
  padding:20px;
}

/* MODAL */
.workshop-modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
}

.workshop-modal-content{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.7);
  background:#fff;
  color:#000;
  padding:30px;
  border-radius:15px;
  transition:0.3s;
}

.workshop-modal.show .workshop-modal-content{
  transform:translate(-50%,-50%) scale(1);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h2>Login</h2>
  <input type="text" id="username">
  <input type="password" id="password">
  <button onclick="login()">Login</button>
  <p id="error"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="sidebar">
  <button onclick="openWorkshopFilter()">📊 SkillX-Quiz-Result</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">
  <h2>Dashboard</h2>
</div>

</div>

<!-- MODAL -->
<div id="workshopModal" class="workshop-modal">
  <div class="workshop-modal-content">
    <span onclick="closeWorkshopModal()">❌</span>

    <select id="workshopSelect">
      <option value="">Select Workshop</option>
      <option value="AI for Business Decision-Making">AI Business</option>
      <option value="Web Development">Web Dev</option>
    </select>

    <button onclick="goToWorkshop()">Go</button>
  </div>
</div>

<script>

// LOGIN
function login(){
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user==="admin" && pass==="12345"){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("dashboard").style.display="block";
  } else {
    document.getElementById("error").innerText="Invalid Login";
  }
}

function logout(){location.reload();}

// OPEN MODAL
function openWorkshopFilter(){
  let modal = document.getElementById("workshopModal");
  modal.style.display="block";
  setTimeout(()=>modal.classList.add("show"),10);
}

// CLOSE MODAL
function closeWorkshopModal(){
  let modal = document.getElementById("workshopModal");
  modal.classList.remove("show");
  setTimeout(()=>modal.style.display="none",300);
}

// GO BUTTON
function goToWorkshop(){
  let val = document.getElementById("workshopSelect").value;

  if(!val){
    alert("Select workshop");
    return;
  }

  if(val==="AI for Business Decision-Making"){
    window.open("ai-business.html","_blank");
  }else{
    alert(val + " selected");
  }

  closeWorkshopModal();
}

// CLICK OUTSIDE CLOSE
window.onclick = function(e){
  let modal = document.getElementById("workshopModal");
  if(e.target === modal){
    closeWorkshopModal();
  }
}

</script>

</body>
</html>
