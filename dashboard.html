<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:#fff;}

/* LOGIN */
.login-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.08);
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:300px;
}

.login-box input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

.login-box button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ffd700;
  cursor:pointer;
}

.error{color:red;font-size:13px}

/* DASHBOARD HIDDEN INITIALLY */
#dashboard{display:none;}

/* ===== SIDEBAR ===== */
.sidebar{
  width:240px;height:100vh;position:fixed;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  padding:20px;
}

.sidebar button{
  width:100%;margin:10px 0;padding:12px;
  border-radius:12px;border:none;
  background:rgba(255,255,255,0.1);
  color:#fff;cursor:pointer;
}

/* MAIN */
.main{margin-left:260px;padding:30px;}
.cards{display:flex;gap:20px;flex-wrap:wrap;}
.card{flex:1;min-width:250px;padding:20px;border-radius:20px;background:rgba(255,255,255,0.08);}
.value{font-size:28px;font-weight:bold;}
.charts{margin-top:30px;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}
.chart-box{background:rgba(255,255,255,0.08);padding:20px;border-radius:20px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h2>🔐 Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p class="error" id="error"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="sidebar">
  <h2>📊 Dashboard</h2>
  <a href="Career-result.html"><button>🎓 Career Quiz</button></a>
  <a href="skillx-result.html"><button>💼 SkillX Quiz</button></a>
  <button onclick="location.reload()">🔄 Refresh</button>
  <button onclick="logout()">🚪 Logout</button>
</div>

<div class="main">
<div class="header">🚀 Smart Analytics Dashboard</div>

<div class="cards">
  <div class="card"><h3>Career Students</h3><div class="value" id="careerCount">0</div></div>
  <div class="card"><h3>SkillX Students</h3><div class="value" id="skillCount">0</div></div>
  <div class="card"><h3>Total Students</h3><div class="value" id="totalCount">0</div></div>
</div>

<div class="charts">
  <div class="chart-box"><canvas id="careerChart"></canvas></div>
  <div class="chart-box"><canvas id="skillChart"></canvas></div>
  <div class="chart-box"><canvas id="comparisonChart"></canvas></div>
</div>

</div>
</div>

<script>

// 🔐 LOGIN DETAILS (CHANGE HERE)
const validUser = "admin";
const validPass = "12345";

// LOGIN FUNCTION
function login(){
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user === validUser && pass === validPass){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadDashboard();
  } else {
    document.getElementById("error").innerText = "Invalid Login!";
  }
}

// LOGOUT
function logout(){
  location.reload();
}

// LOAD DATA
function loadDashboard(){

const careerURL = "https://opensheet.elk.sh/1jNv8d_espnJk8TqeosoXb01rT3dNbpG2auKHMYxXpQw/Sheet1";
const skillURL  = "https://opensheet.elk.sh/1KTjnVvWgT0MhFfT9kJenWgfWnFvE6TAncqxnhAuxytk/Sheet1";

Promise.all([
  fetch(careerURL).then(res=>res.json()),
  fetch(skillURL).then(res=>res.json())
])
.then(([careerData, skillData])=>{

  document.getElementById("careerCount").innerText = careerData.length;
  document.getElementById("skillCount").innerText = skillData.length;
  document.getElementById("totalCount").innerText = careerData.length + skillData.length;

  let careerMap = {};
  careerData.forEach(r=>{
    let c = r["Top Career"] || "Unknown";
    careerMap[c] = (careerMap[c] || 0) + 1;
  });

  new Chart(document.getElementById("careerChart"),{
    type:'doughnut',
    data:{labels:Object.keys(careerMap),datasets:[{data:Object.values(careerMap)}]}
  });

  let skillMap = {};
  skillData.forEach(r=>{
    let d = r["Bundle Domain"] || "Unknown";
    skillMap[d] = (skillMap[d] || 0) + 1;
  });

  new Chart(document.getElementById("skillChart"),{
    type:'pie',
    data:{labels:Object.keys(skillMap),datasets:[{data:Object.values(skillMap)}]}
  });

  new Chart(document.getElementById("comparisonChart"),{
    type:'bar',
    data:{
      labels:["Career","SkillX"],
      datasets:[{label:"Students",data:[careerData.length, skillData.length]}]
    }
  });

});
}

</script>

</body>
</html>
