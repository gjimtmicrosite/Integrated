<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:240px;
  height:100vh;
  position:fixed;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.1);
}

.sidebar h2{
  color:#ffd700;
  margin-bottom:20px;
}

.sidebar button{
  width:100%;
  margin:10px 0;
  padding:12px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:#fff;
  cursor:pointer;
  transition:0.3s;
}

.sidebar button:hover{
  background:#ffd700;
  color:#000;
  transform:scale(1.05);
}

/* ===== MAIN ===== */
.main{
  margin-left:260px;
  padding:30px;
}

/* HEADER */
.header{
  font-size:28px;
  margin-bottom:20px;
}

/* CARDS */
.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  flex:1;
  min-width:250px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transform:perspective(1000px) rotateX(5deg);
  transition:0.3s;
}

.card:hover{
  transform:perspective(1000px) rotateX(0deg) scale(1.05);
}

.card h3{
  margin-bottom:10px;
  color:#ffd700;
}

.value{
  font-size:28px;
  font-weight:bold;
}

/* CHART GRID */
.charts{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

.chart-box{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>📊 Dashboard</h2>
  <a href="Career-result.html">   <button>🎓 Career Quiz</button></a>
        <a href="skillx-result.html"><button>💼 SkillX Quiz</button></a>
  <button onclick="location.reload()">🔄 Refresh</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">🚀 Smart Analytics Dashboard</div>

<div class="cards">
  <div class="card">
    <h3>Career Students</h3>
    <div class="value" id="careerCount">0</div>
  </div>

  <div class="card">
    <h3>SkillX Students</h3>
    <div class="value" id="skillCount">0</div>
  </div>

  <div class="card">
    <h3>Total Students</h3>
    <div class="value" id="totalCount">0</div>
  </div>
</div>

<div class="charts">
  <div class="chart-box">
    <canvas id="careerChart"></canvas>
  </div>

  <div class="chart-box">
    <canvas id="skillChart"></canvas>
  </div>

  <div class="chart-box">
    <canvas id="comparisonChart"></canvas>
  </div>
</div>

</div>

<script>

// ✅ GOOGLE SHEET LINKS
const careerURL = "https://opensheet.elk.sh/1jNv8d_espnJk8TqeosoXb01rT3dNbpG2auKHMYxXpQw/Sheet1";
const skillURL  = "https://opensheet.elk.sh/1KTjnVvWgT0MhFfT9kJenWgfWnFvE6TAncqxnhAuxytk/Sheet1";

// LOAD DATA
Promise.all([
  fetch(careerURL).then(res=>res.json()),
  fetch(skillURL).then(res=>res.json())
])
.then(([careerData, skillData])=>{

  // COUNTS
  document.getElementById("careerCount").innerText = careerData.length;
  document.getElementById("skillCount").innerText = skillData.length;
  document.getElementById("totalCount").innerText = careerData.length + skillData.length;

  // ===== CAREER DOMAIN CHART =====
  let careerMap = {};

  careerData.forEach(r=>{
    let c = r["Top Career"] || "Unknown";
    careerMap[c] = (careerMap[c] || 0) + 1;
  });

  new Chart(document.getElementById("careerChart"),{
    type:'doughnut',
    data:{
      labels:Object.keys(careerMap),
      datasets:[{
        data:Object.values(careerMap)
      }]
    }
  });

  // ===== SKILLX DOMAIN =====
  let skillMap = {};

  skillData.forEach(r=>{
    let d = r["Bundle Domain"] || "Unknown";
    skillMap[d] = (skillMap[d] || 0) + 1;
  });

  new Chart(document.getElementById("skillChart"),{
    type:'pie',
    data:{
      labels:Object.keys(skillMap),
      datasets:[{
        data:Object.values(skillMap)
      }]
    }
  });

  // ===== COMPARISON =====
  new Chart(document.getElementById("comparisonChart"),{
    type:'bar',
    data:{
      labels:["Career","SkillX"],
      datasets:[{
        label:"Students",
        data:[careerData.length, skillData.length]
      }]
    }
  });

});
</script>

</body>
</html>
