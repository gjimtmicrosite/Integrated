<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>GJIMT Career Guidance Test</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#0A3663;--gold:#D4AF37;--light:#f4f7fb;--white:#fff;--gray:#6c757d;--green:#28a745;--radius:12px}
body{font-family:'Segoe UI',sans-serif;background:var(--light);color:#222;min-height:100vh}
header{background:var(--blue);color:#fff;padding:16px 20px;text-align:center}
header h1{font-size:clamp(1.1rem,4vw,1.6rem);color:var(--gold);margin-bottom:4px}
header p{font-size:clamp(0.75rem,3vw,0.95rem);opacity:.9}
.lang-bar{display:flex;justify-content:center;gap:10px;padding:12px;background:#e8eef5;flex-wrap:wrap}
.lang-btn{padding:7px 22px;border:2px solid var(--blue);border-radius:20px;background:#fff;color:var(--blue);font-weight:600;cursor:pointer;font-size:.9rem;transition:all .2s}
.lang-btn.active,.lang-btn:hover{background:var(--blue);color:#fff}
.card{background:#fff;border-radius:var(--radius);padding:28px 24px;margin:20px auto;max-width:680px;box-shadow:0 4px 18px rgba(0,0,0,.09)}
.card h2{color:var(--blue);font-size:clamp(1rem,4vw,1.3rem);margin-bottom:18px;border-bottom:3px solid var(--gold);padding-bottom:10px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-weight:600;margin-bottom:6px;font-size:.92rem;color:var(--blue)}
.form-group input,.form-group select{width:100%;padding:11px 14px;border:1.5px solid #ccd6e0;border-radius:8px;font-size:1rem;font-family:inherit;transition:border .2s;background:#fff}
.form-group input:focus,.form-group select:focus{border-color:var(--blue);outline:none}
.progress-wrap{margin-bottom:18px}
.prog-label{display:flex;justify-content:space-between;font-size:.82rem;color:var(--gray);margin-bottom:5px}
.prog-bar{height:9px;background:#dde4ec;border-radius:10px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--gold));border-radius:10px;transition:width .4s ease}
.q-num{font-size:.8rem;color:var(--gray);margin-bottom:5px;font-weight:600;letter-spacing:.3px}
.q-text{font-size:clamp(.95rem,3.5vw,1.1rem);font-weight:700;color:#1a1a2e;margin-bottom:20px;line-height:1.55}
.likert{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:6px}
.l-item{display:flex;flex-direction:column;align-items:center}
.l-item input[type=radio]{display:none}
.l-item label{width:100%;text-align:center;background:#eef2f7;border:2px solid #ccd6e0;border-radius:10px;padding:11px 3px;cursor:pointer;transition:all .2s;font-size:.73rem;color:#444;font-weight:500;line-height:1.35;user-select:none}
.l-item input[type=radio]:checked + label{background:var(--blue);color:#fff;border-color:var(--blue);transform:scale(1.06);box-shadow:0 2px 8px rgba(10,54,99,.3)}
.btn{display:inline-block;padding:13px 28px;border-radius:10px;border:none;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;text-decoration:none;text-align:center;font-family:inherit}
.btn-primary{background:var(--blue);color:#fff;width:100%;margin-top:12px}
.btn-primary:hover{background:#0d4a8a}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-gold{background:var(--gold);color:var(--blue)}
.btn-gold:hover{background:#c8a430}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#218838}
.action-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}
.action-row .btn{flex:1;min-width:130px;font-size:.85rem;padding:12px 8px}
.rank-card{border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;border-left:6px solid}
.rank-1{border-color:var(--gold);background:#fffbee}
.rank-2{border-color:#6c8ebf;background:#f0f4ff}
.rank-3{border-color:#82b366;background:#f0fff4}
.rank-badge{display:inline-block;padding:3px 13px;border-radius:20px;font-size:.76rem;font-weight:700;margin-bottom:9px}
.rank-1 .rank-badge{background:var(--gold);color:var(--blue)}
.rank-2 .rank-badge{background:#6c8ebf;color:#fff}
.rank-3 .rank-badge{background:#82b366;color:#fff}
.rank-title{font-size:1.1rem;font-weight:700;color:var(--blue);margin-bottom:7px}
.rank-why{font-size:.87rem;color:#444;line-height:1.65;margin-bottom:6px}
.rank-career{font-size:.82rem;color:#555;font-style:italic;line-height:1.5}
.chart-wrap{position:relative;width:100%;max-width:420px;height:420px;margin:0 auto 26px}
.chart-wrap canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important}
.alert{padding:11px 15px;border-radius:8px;font-size:.88rem;margin-top:12px}
.alert-ok{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
.alert-err{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
.hidden{display:none!important}
.info-bar{background:#e8f0fe;border-radius:8px;padding:12px 16px;margin-bottom:18px;font-size:.88rem;color:#0A3663;font-weight:500;line-height:1.5}
@media(max-width:500px){
  .card{padding:18px 14px;margin:10px}
  .likert{gap:4px}
  .l-item label{padding:9px 2px;font-size:.66rem}
  .chart-wrap{height:300px}
  .action-row .btn{min-width:90px;font-size:.78rem;padding:10px 5px}
}
@media print{
  header,.lang-bar,.action-row,.alert{display:none!important}
  .card{box-shadow:none;margin:0;padding:8px;max-width:100%}
  body{background:#fff}
  .chart-wrap{height:350px}
}
</style>
</head>
<body>

<header>
  <h1 id="hTitle">GJIMT Career Guidance Test</h1>
  <p id="hSub">Gian Jyoti Institute of Management &amp; Technology, Mohali</p>
</header>

<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('en')">English</button>
  <button class="lang-btn" onclick="setLang('hi')">हिंदी</button>
  <button class="lang-btn" onclick="setLang('pa')">ਪੰਜਾਬੀ</button>
</div>

<!-- SCREEN 1: Info Form -->
<div id="s1" class="card">
  <h2 id="t_infoTitle">Student Information</h2>
  <div class="info-bar" id="t_infoNote">Please fill in all details carefully. Your results will be saved for GJIMT admissions counselling.</div>
  <div class="form-group">
    <label id="t_lName">Full Name *</label>
    <input type="text" id="stName" placeholder="Enter your full name"/>
  </div>
  <div class="form-group">
   <label id="t_lPhone">Phone Number *</label>
    <input type="tel" id="stPhone" placeholder="+91 XXXXX XXXXX"/>
  </div>
  <div class="form-group">
    <label id="t_lBoard">Board *</label>
    <select id="stBoard">
      <option value="">-- Select Board --</option>
      <option value="CBSE">CBSE</option>
      <option value="PSEB">PSEB</option>
      <option value="ICSE">ICSE</option>
      <option value="Other State Board">Other State Board</option>
    </select>
  </div>
  <div class="form-group">
    <label id="t_lStream">Stream (Class 12) *</label>
    <select id="stStream">
      <option value="">-- Select Stream --</option>
      <option value="Commerce">Commerce</option>
      <option value="Non-Medical">Non-Medical (Science)</option>
      <option value="Medical">Medical (Science)</option>
      <option value="Arts">Arts / Humanities</option>
      <option value="Vocational">Vocational</option>
    </select>
  </div>
  <button class="btn btn-primary" id="t_btnStart" onclick="startTest()">Start Test →</button>
</div>

<!-- SCREEN 2: Questions -->
<div id="s2" class="card hidden">
  <div class="progress-wrap">
    <div class="prog-label">
      <span id="qLabel">Question 1 of 42</span>
      <span id="qPct">0%</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="q-num" id="qNum"></div>
  <div class="q-text" id="qText"></div>
  <div class="likert" id="likertDiv"></div>
  <button class="btn btn-primary" id="btnNext" onclick="nextQ()" style="margin-top:18px" disabled>Next →</button>
</div>

<!-- SCREEN 3: Results -->
<div id="s3" class="card hidden">
  <h2 id="t_resTitle">Your Career Profile</h2>
  <p id="resGreet" style="margin-bottom:18px;color:#444;font-size:.95rem;line-height:1.6"></p>
  <div class="chart-wrap">anvas id="radarChart"></canvas></div>
  <div id="rankDiv"></div>
  <div id="msgOk" class="alert alert-ok hidden"></div>
  <div id="msgErr" class="alert alert-err hidden"></div>
  <div class="action-row">
    <button class="btn btn-green" onclick="window.print()" id="t_btnPrint">🖨️ Print / Save PDF</button>
    <a class="btn btn-gold" href="tel:+919876543210" id="t_btnCall">📞 Call Admissions</a>
    <button class="btn btn-primary" onclick="location.reload()" id="t_btnRetake">🔄 Retake Test</button>
  </div>
</div>
