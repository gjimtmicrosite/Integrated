<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noor – GJIMT AI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#3a0f0f);background-size:400% 400%;animation:bgMove 12s ease infinite;color:white;}
@keyframes bgMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.container{width:500px;background:rgba(255,255,255,0.12);backdrop-filter:blur(18px);padding:35px;border-radius:25px;box-shadow:0 0 40px rgba(0,0,0,0.5);text-align:center;}
.logo{font-size:28px;font-weight:600;margin-bottom:5px;}
.subtitle{opacity:0.85;font-size:14px;margin-bottom:18px;}
.ai-avatar{width:220px;margin:auto;cursor:pointer;transition:0.4s;}
.ai-avatar img{width:100%;border-radius:20px;}
.ai-avatar:hover{transform:scale(1.05);}
.ai-avatar.listening{animation:pulse 1.2s infinite;}
@keyframes pulse{0%{filter:drop-shadow(0 0 10px red)}50%{filter:drop-shadow(0 0 35px red)}100%{filter:drop-shadow(0 0 10px red)}}
.status{margin-top:15px;font-size:15px;}
.command-box{margin-top:15px;}
.command-box input{width:100%;padding:10px;border:none;border-radius:10px;font-size:14px;text-align:center;}
.controls{margin-top:12px;}
.btn{padding:8px 16px;margin:4px;border:none;border-radius:18px;background:#00c6ff;color:white;cursor:pointer;}
.btn:hover{background:#0096c7;}
.footer{margin-top:20px;font-size:12px;opacity:0.6;}
</style>
</head>
<body>

<div class="container">
  <div class="logo">Noor – GJIMT AI</div>
  <div class="subtitle">Tapp Noor and speak</div>
  <div id="mic" class="ai-avatar">
    <img src="ai-lady-robot.png" alt="Noor Avatar">
  </div>
  <div id="status" class="status">Ready to help you</div>
  <div class="command-box">
    <input id="speechText" placeholder="Your spoken command will appear here">
  </div>
  <div class="controls">
    <button class="btn" onclick="pauseVoice()">Pause</button>
    <button class="btn" onclick="playVoice()">Play</button>
    <button class="btn" onclick="stopAssistant()">Stop</button>
  </div>
  <div class="footer">Powered by GJIMT AI</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const mic = document.getElementById("mic");
  const status = document.getElementById("status");
  const speechText = document.getElementById("speechText");

  let languageMode = "en";
  let recognitionActive = false;

  // Updated full introduction
  const introEN = `Hello. I am Noor, the artificial intelligence assistant of GJIMT. 
I joined the Gian Jyoti Group on the first of March 2026. 
My arrival here became possible because of the vision and dedication of Respected chairman Mr. Jas Bedi and director Dr. Aneet Bedi. 
He worked with great passion and determination to bring artificial intelligence and robotics to the campus. 
Today I help visitors, students and parents by answering questions about GJIMT, admissions, courses and campus information. 
I am always happy to assist you.`;

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    status.innerText = "Speech Recognition not supported in this browser.";
    mic.style.cursor = "not-allowed";
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "en-IN";
  recognition.interimResults = true;
  recognition.continuous = true;

  let finalTranscript = "";

  // Start listening
  mic.addEventListener("click", function(){
    if(recognitionActive) return;
    recognitionActive = true;
    finalTranscript = "";
    mic.classList.add("listening");
    status.innerText="Listening...";
    recognition.start();
  });

  recognition.onresult = function(event){
    let interimTranscript = "";
    for(let i=event.resultIndex;i<event.results.length;i++){
      if(event.results[i].isFinal){
        finalTranscript += event.results[i][0].transcript + " ";
      } else {
        interimTranscript += event.results[i][0].transcript;
      }
    }
    speechText.value = finalTranscript + interimTranscript;
  }

  recognition.onend = function(){
    mic.classList.remove("listening");
    recognitionActive = false;

    let question = finalTranscript.trim();
    if(!question) return;

    let q = question.toLowerCase();

    // Local introduction only
    if(q.includes("introduce") || q.includes("about yourself")){
      speak(introEN);
      return;
    }

    // All other queries sent to n8n
    sendToAI(question);
  }

  async function sendToAI(question){
    status.innerText = "Thinking...";
    try{
      const response = await fetch("https://aiprojectsgjimt.app.n8n.cloud/webhook/e08197d1-8396-46c6-b94b-9d4c0fc6848d", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({query:question})
      });
      const data = await response.json();
      let reply = data.output || data.response || data.answer || "Sorry, I couldn't get a response.";
      speak(reply);
    }catch(error){
      console.error("Fetch error:", error);
      speak("Server connection problem.");
    }
  }

  // Text-to-speech with female voice
  function speak(text){
    recognition.abort();
    speechSynthesis.cancel();

    const utter = new SpeechSynthesisUtterance(text);
    let voices = speechSynthesis.getVoices();
    let female = voices.find(v => /female|woman|girl/i.test(v.name)) || voices[0];
    if(female) utter.voice = female;

    utter.lang = "en-IN";
    utter.rate = 0.95;
    utter.pitch = 1.1;

    utter.onstart = ()=> status.innerText="Speaking...";
    utter.onend = ()=> status.innerText="Ready to help you";

    speechSynthesis.speak(utter);
  }

  window.pauseVoice = ()=> speechSynthesis.pause();
  window.playVoice = ()=> speechSynthesis.resume();
  window.stopAssistant = ()=>{
    speechSynthesis.cancel();
    recognition.abort();
    status.innerText="Ready";
  }

  // Ensure voices are loaded
  speechSynthesis.onvoiceschanged = ()=>{};
});
</script>

</body>
</html>
