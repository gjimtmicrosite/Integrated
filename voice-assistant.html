```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Noor – GJIMT AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#3a0f0f);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
width:420px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(18px);
padding:40px;
border-radius:25px;
box-shadow:0 0 40px rgba(0,0,0,0.4);
text-align:center;
}

.logo{
font-size:28px;
font-weight:600;
margin-bottom:8px;
}

.subtitle{
opacity:0.8;
font-size:14px;
margin-bottom:25px;
}

.ai-avatar{
width:240px;
margin:auto;
cursor:pointer;
transition:0.4s;
}

.ai-avatar img{
width:100%;
border-radius:20px;
}

.ai-avatar:hover{
transform:scale(1.05);
}

.ai-avatar.listening{
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{filter:drop-shadow(0 0 10px red)}
50%{filter:drop-shadow(0 0 35px red)}
100%{filter:drop-shadow(0 0 10px red)}
}

.status{
margin-top:20px;
font-size:15px;
opacity:0.9;
}

.controls{
margin-top:15px;
}

.btn{
padding:9px 18px;
margin:5px;
border:none;
border-radius:20px;
background:#00c6ff;
color:white;
cursor:pointer;
font-size:13px;
}

.btn:hover{
background:#0096c7;
}

.stop{
background:#ff4b5c;
}

.stop:hover{
background:#d93b49;
}

.footer{
margin-top:25px;
font-size:12px;
opacity:0.6;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">Noor – GJIMT AI</div>

<div class="subtitle">
Tap Noor and ask your question
</div>

<div id="mic" class="ai-avatar" onclick="startListening()">
<img src="ai-lady-robot.png">
</div>

<div id="status" class="status">
Ready to help you
</div>

<div class="controls">

<button class="btn" onclick="pauseVoice()">Pause</button>
<button class="btn" onclick="playVoice()">Play</button>
<button class="btn stop" onclick="stopAssistant()">Stop</button>

</div>

<div class="footer">
Powered by GJIMT AI
</div>

</div>

<script>

const mic = document.getElementById("mic")
const status = document.getElementById("status")

let voices=[]
let languageMode="en"

/* LOAD VOICES */

speechSynthesis.onvoiceschanged=()=>{
voices=speechSynthesis.getVoices()
}

/* SPEECH RECOGNITION */

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition
const recognition = new SpeechRecognition()

recognition.lang="en-IN"
recognition.interimResults=false
recognition.maxAlternatives=1

function startListening(){

speechSynthesis.cancel()

mic.classList.add("listening")
status.innerHTML="Listening..."

recognition.start()

}

recognition.onresult=function(event){

let question = event.results[0][0].transcript
status.innerHTML="Thinking..."

processQuestion(question)

}

recognition.onend=function(){
mic.classList.remove("listening")
}

/* PROCESS QUESTION */

function processQuestion(question){

let q = question.toLowerCase()

/* SWITCH LANGUAGE */

if(q.includes("hindi bolo") || q.includes("speak in hindi") || q.includes("hindi mein")){

languageMode="hi"
speak("अब मैं हिंदी में बात करूँगी")
return

}

if(q.includes("english bolo") || q.includes("speak in english")){

languageMode="en"
speak("Now I will speak in English")
return

}

/* INTRO */

if(q.includes("who are you") || q.includes("introduce")){

let intro=`Hello. I am Noor, the artificial intelligence assistant of GJIMT.

I joined the Gian Jyoti Group on the first of March 2026.

Today I help visitors, students and parents by answering questions about admissions, courses and campus information.`

speak(intro)
return

}

sendToAI(question)

}

/* SEND TO AI */

async function sendToAI(question){

try{

const response = await fetch(
"https://aiprojectsgjimt.app.n8n.cloud/webhook/ai-kiosk",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({query:question})
})

const data = await response.json()

let reply = data.output || data.response || "Sorry I did not understand."

if(languageMode==="hi"){
reply = await translateToHindi(reply)
}

speak(reply)

}catch{

speak("Server connection problem.")

}

}

/* TRANSLATE TO HINDI */

async function translateToHindi(text){

try{

let url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=hi&dt=t&q=${encodeURIComponent(text)}`

let res=await fetch(url)
let data=await res.json()

return data[0][0][0]

}catch{

return text

}

}

/* SPEAK FUNCTION */

function speak(text){

speechSynthesis.cancel()

const speech=new SpeechSynthesisUtterance(text)

speech.rate=0.92
speech.pitch=1.2

let selectedVoice

if(languageMode==="hi"){

speech.lang="hi-IN"

selectedVoice = voices.find(v =>
v.lang==="hi-IN" &&
(v.name.toLowerCase().includes("female") ||
v.name.toLowerCase().includes("google"))
)

}else{

speech.lang="en-IN"

/* Force Indian female voice */

selectedVoice = voices.find(v =>
(v.lang==="en-IN" &&
v.name.toLowerCase().includes("female"))
)

|| voices.find(v =>
v.lang==="en-IN"
)

}

/* Apply voice */

if(selectedVoice){
speech.voice = selectedVoice
}

speech.onstart = ()=> status.innerHTML="Speaking..."
speech.onend = ()=> status.innerHTML="Ready to help you"

speechSynthesis.speak(speech)

}

/* CONTROLS */

function pauseVoice(){

speechSynthesis.pause()
status.innerHTML="Voice paused"

}

function playVoice(){

speechSynthesis.resume()
status.innerHTML="Voice resumed"

}

function stopAssistant(){

speechSynthesis.cancel()
recognition.abort()

mic.classList.remove("listening")

status.innerHTML="Ready for next question"

}

</script>

</body>
</html>
