<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noor – GJIMT AI 3D Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#3a0f0f);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:460px;
text-align:center;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(16px);
padding:30px;
border-radius:25px;
box-shadow:0 0 40px rgba(0,0,0,0.4);
}

.logo{
font-size:28px;
font-weight:600;
}

.subtitle{
font-size:14px;
opacity:.8;
margin-bottom:15px;
}

#avatarCanvas{
width:260px;
height:260px;
margin:auto;
border-radius:20px;
overflow:hidden;
}

.status{
margin-top:15px;
font-size:14px;
}

.controls{
margin-top:12px;
}

button{
padding:8px 15px;
margin:4px;
border:none;
border-radius:18px;
background:#00c6ff;
color:white;
cursor:pointer;
}

.quick{
margin-top:12px;
}

.quick button{
background:#6c5ce7;
}

.footer{
font-size:12px;
margin-top:15px;
opacity:.6;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">Noor – GJIMT AI</div>
<div class="subtitle">Say "Hello Noor" or press Start</div>

<div id="avatarCanvas"></div>

<div class="status" id="status">Ready to help you</div>

<div class="controls">
<button onclick="startListening()">Start</button>
<button onclick="pauseVoice()">Pause</button>
<button onclick="stopAssistant()">Stop</button>
</div>

<div class="quick">
<button onclick="askCourses()">Courses</button>
<button onclick="askAdmission()">Admissions</button>
<button onclick="askFees()">Fees</button>
<button onclick="askContact()">Contact</button>
</div>

<div class="footer">Powered by GJIMT AI</div>

</div>

<script>

/* 3D AVATAR */

let scene = new THREE.Scene()
let camera = new THREE.PerspectiveCamera(35,1,0.1,1000)
let renderer = new THREE.WebGLRenderer({alpha:true})

renderer.setSize(260,260)
document.getElementById("avatarCanvas").appendChild(renderer.domElement)

camera.position.z = 2

const light = new THREE.HemisphereLight(0xffffff,0x444444)
scene.add(light)

let avatar

const loader = new THREE.GLTFLoader()

loader.load(

"https://models.readyplayer.me/69b785224d98c76821309d95.glb",

function(gltf){

avatar = gltf.scene
scene.add(avatar)

animate()

}

)

function animate(){

requestAnimationFrame(animate)

if(avatar){
avatar.rotation.y += 0.002
}

renderer.render(scene,camera)

}

/* SPEECH */

let voices=[]
speechSynthesis.onvoiceschanged=()=>{
voices=speechSynthesis.getVoices()
}

function speak(text){

const speech=new SpeechSynthesisUtterance(text)

speech.rate=0.95
speech.pitch=1.2

let voice=voices.find(v=>v.lang==="en-IN") || voices[0]
speech.voice=voice

speech.onstart=()=>{
document.getElementById("status").innerHTML="Speaking..."
}

speech.onend=()=>{
document.getElementById("status").innerHTML="Ready to help you"
}

speechSynthesis.speak(speech)

}

/* SPEECH RECOGNITION */

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition
const recognition = new SpeechRecognition()

recognition.lang="en-IN"

function startListening(){

document.getElementById("status").innerHTML="Listening..."
recognition.start()

}

recognition.onresult=function(event){

let question=event.results[0][0].transcript

if(question.toLowerCase().includes("hello noor")){
speak("Hello, how may I assist you today?")
return
}

sendToAI(question)

}

/* AI WEBHOOK */

async function sendToAI(question){

try{

const response = await fetch(
"https://aiprojectsgjimt.app.n8n.cloud/webhook/ai-kiosk",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({query:question})
})

const data=await response.json()

let reply=data.output || data.response || "Sorry I did not understand."

speak(reply)

}catch{

speak("Server connection problem.")

}

}

/* QUICK BUTTONS */

function askCourses(){sendToAI("What courses are offered at GJIMT")}
function askAdmission(){sendToAI("Tell me about admissions at GJIMT")}
function askFees(){sendToAI("Tell me about course fees at GJIMT")}
function askContact(){sendToAI("Give contact details of GJIMT")}

/* CONTROLS */

function pauseVoice(){
speechSynthesis.pause()
}

function stopAssistant(){

speechSynthesis.cancel()
recognition.abort()
document.getElementById("status").innerHTML="Stopped"

}

</script>

</body>
</html>
