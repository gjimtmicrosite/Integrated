<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Noor – GJIMT AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#3a0f0f);
background-size:400% 400%;
animation:bgMove 12s ease infinite;

color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{

width:440px;

background:rgba(255,255,255,0.12);
backdrop-filter:blur(18px);

padding:35px;

border-radius:25px;

box-shadow:0 0 40px rgba(0,0,0,0.5);

text-align:center;

}

.logo{
font-size:30px;
font-weight:600;
margin-bottom:5px;
}

.subtitle{
opacity:0.85;
font-size:14px;
margin-bottom:20px;
}

/* Avatar */

.ai-avatar{

width:230px;

margin:auto;

cursor:pointer;

transition:0.4s;

}

.ai-avatar img{
width:100%;
border-radius:20px;
}

.ai-avatar:hover{
transform:scale(1.05);
}

/* speaking animation */

.ai-avatar.speaking img{
animation:lipMove 0.25s infinite alternate;
}

@keyframes lipMove{
0%{transform:scaleY(1)}
100%{transform:scaleY(1.08)}
}

/* listening glow */

.ai-avatar.listening{
animation:pulse 1.3s infinite;
}

@keyframes pulse{
0%{filter:drop-shadow(0 0 10px red)}
50%{filter:drop-shadow(0 0 40px red)}
100%{filter:drop-shadow(0 0 10px red)}
}

.status{
margin-top:18px;
font-size:15px;
}

.controls{
margin-top:12px;
}

.btn{

padding:9px 18px;

margin:4px;

border:none;

border-radius:20px;

background:#00c6ff;

color:white;

cursor:pointer;

font-size:13px;

transition:0.3s;

}

.btn:hover{
background:#0096c7;
transform:scale(1.05);
}

.quick{
margin-top:15px;
}

.quick button{

padding:7px 14px;

margin:4px;

border:none;

border-radius:15px;

font-size:12px;

cursor:pointer;

background:#6c5ce7;

color:white;

}

.quick button:hover{
background:#5848d6;
}

.footer{
margin-top:20px;
font-size:12px;
opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">Noor – GJIMT AI</div>

<div class="subtitle">
Tap Noor or say "Hello Noor"
</div>

<div id="mic" class="ai-avatar" onclick="startListening()">
<img src="ai-lady-robot.png">
</div>

<div id="status" class="status">
Ready to help you
</div>

<div class="controls">
<button class="btn" onclick="pauseVoice()">Pause</button>
<button class="btn" onclick="playVoice()">Play</button>
<button class="btn" onclick="stopAssistant()">Stop</button>
</div>

<div class="quick">
<button onclick="askCourses()">Courses</button>
<button onclick="askAdmission()">Admissions</button>
<button onclick="askFees()">Fees</button>
<button onclick="askContact()">Contact</button>
</div>

<div class="footer">
Powered by GJIMT AI
</div>

</div>

<script>

const mic=document.getElementById("mic")
const status=document.getElementById("status")

let languageMode="en"
let voices=[]

speechSynthesis.onvoiceschanged=()=>{
voices=speechSynthesis.getVoices()
}

/* INTRODUCTIONS */

const introEN=`Hello. I am Noor, the artificial intelligence assistant of Gyan Jyoti Institute of Management and Technology.

I joined the Gian Jyoti Group on the first of March 2026.

My arrival here became possible because of the vision and dedication of respected chairman Mister Jas Bedi and Director Doctor Aneet Bedi.

Today I help visitors, students and parents by answering questions about GJIMT, admissions, courses and campus information.

I am always happy to assist you.`


const introHI=`नमस्ते। मैं नूर हूँ, ग्यान ज्योति इंस्टीट्यूट ऑफ मैनेजमेंट एंड टेक्नोलॉजी की आर्टिफिशियल इंटेलिजेंस असिस्टेंट।

मैं पहली मार्च 2026 को जियान ज्योति ग्रुप में शामिल हुई।

मेरा यहाँ आना चेयरमैन श्री जस बेदी और डायरेक्टर डॉक्टर अनीत बेदी के विज़न से संभव हुआ।

आज मैं छात्रों, अभिभावकों और विज़िटर्स को कॉलेज की जानकारी और एडमिशन से जुड़ी सहायता देती हूँ।`


const introPA=`ਸਤ ਸ੍ਰੀ ਅਕਾਲ। ਮੈਂ ਨੂਰ ਹਾਂ, ਗਿਆਨ ਜੋਤੀ ਇੰਸਟੀਚਿਊਟ ਆਫ ਮੈਨੇਜਮੈਂਟ ਐਂਡ ਟੈਕਨੋਲੋਜੀ ਦੀ ਆਰਟੀਫੀਸ਼ਲ ਇੰਟੈਲੀਜੈਂਸ ਅਸਿਸਟੈਂਟ।

ਮੈਂ ਪਹਿਲੀ ਮਾਰਚ 2026 ਨੂੰ ਗਿਆਨ ਜੋਤੀ ਗਰੁੱਪ ਨਾਲ ਜੁੜੀ।

ਮੇਰਾ ਇੱਥੇ ਆਉਣਾ ਚੇਅਰਮੈਨ ਮਿਸਟਰ ਜਸ ਬੇਦੀ ਅਤੇ ਡਾਇਰੈਕਟਰ ਡਾਕਟਰ ਅਨੀਤ ਬੇਦੀ ਦੀ ਸੋਚ ਨਾਲ ਸੰਭਵ ਹੋਇਆ।

ਅੱਜ ਮੈਂ ਵਿਦਿਆਰਥੀਆਂ ਅਤੇ ਵਿਜ਼ਟਰਜ਼ ਨੂੰ ਕਾਲਜ ਦੀ ਜਾਣਕਾਰੀ ਅਤੇ ਐਡਮਿਸ਼ਨ ਬਾਰੇ ਮਦਦ ਕਰਦੀ ਹਾਂ।`

/* SPEECH RECOGNITION */

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition
const recognition = new SpeechRecognition()

recognition.lang="en-IN"

/* language detect */

function detectLanguage(text){

if(/[\u0A00-\u0A7F]/.test(text)) return "pa"

if(/[\u0900-\u097F]/.test(text)) return "hi"

return "en"

}

function startListening(){

mic.classList.add("listening")
status.innerHTML="Listening..."

recognition.start()

}

recognition.onresult=function(event){

let question=event.results[0][0].transcript
let q=question.toLowerCase()

languageMode=detectLanguage(question)

/* INTRO KEYWORDS */

if(q.includes("introduce") || q.includes("about yourself")){

languageMode="en"
speak(introEN)
return

}

if(q.includes("अपने बारे") || q.includes("परिचय") || q.includes("आप कौन")){

languageMode="hi"
speak(introHI)
return

}

if(q.includes("ਆਪਣੇ ਬਾਰੇ") || q.includes("ਤੁਸੀਂ ਕੌਣ")){

languageMode="pa"
speak(introPA)
return

}

/* otherwise send to AI */

sendToAI(question)

}

recognition.onend=function(){
mic.classList.remove("listening")
}

/* AI webhook */

async function sendToAI(question){

try{

const response=await fetch("https://aiprojectsgjimt.app.n8n.cloud/webhook/ai-kiosk",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({query:question})

})

const data=await response.json()

let reply=data.output || data.response || "Sorry I did not understand."

speak(reply)

}catch{

speak("Server connection problem.")

}

}

/* SPEAK */

function speak(text){

speechSynthesis.cancel()

mic.classList.add("speaking")

const speech=new SpeechSynthesisUtterance(text)

speech.lang = languageMode==="hi" ? "hi-IN" : languageMode==="pa" ? "pa-IN" : "en-IN"

speech.rate=0.95

/* prefer female voice */

let female=voices.find(v=>v.name.toLowerCase().includes("female") || v.name.includes("Google"))

if(female) speech.voice=female

speech.onend=()=>{
mic.classList.remove("speaking")
status.innerHTML="Ready to help you"
}

speechSynthesis.speak(speech)

status.innerHTML="Speaking..."

}

/* buttons */

function askCourses(){sendToAI("courses in gjimt")}
function askAdmission(){sendToAI("admissions in gjimt")}
function askFees(){sendToAI("fees structure gjimt")}
function askContact(){sendToAI("contact details gjimt")}

function pauseVoice(){speechSynthesis.pause()}
function playVoice(){speechSynthesis.resume()}

function stopAssistant(){

speechSynthesis.cancel()
recognition.abort()

mic.classList.remove("listening")
mic.classList.remove("speaking")

status.innerHTML="Ready"

}

</script>

</body>
</html>
