
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Noor – GJIMT AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#3a0f0f);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
width:430px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(18px);
padding:35px;
border-radius:25px;
box-shadow:0 0 40px rgba(0,0,0,0.4);
text-align:center;
}

.logo{
font-size:28px;
font-weight:600;
margin-bottom:5px;
}

.subtitle{
opacity:0.8;
font-size:14px;
margin-bottom:20px;
}

.ai-avatar{
width:220px;
margin:auto;
cursor:pointer;
transition:0.4s;
}

.ai-avatar img{
width:100%;
border-radius:20px;
}

.ai-avatar:hover{
transform:scale(1.05);
}

.ai-avatar.listening{
animation:pulse 1.2s infinite;
}

.ai-avatar.speaking{
animation:talkGlow 1s infinite alternate;
}

@keyframes pulse{
0%{filter:drop-shadow(0 0 10px red)}
50%{filter:drop-shadow(0 0 35px red)}
100%{filter:drop-shadow(0 0 10px red)}
}

@keyframes talkGlow{
from{filter:drop-shadow(0 0 10px cyan)}
to{filter:drop-shadow(0 0 35px cyan)}
}

.status{
margin-top:18px;
font-size:15px;
opacity:0.9;
}

.controls{
margin-top:10px;
}

.btn{
padding:8px 16px;
margin:4px;
border:none;
border-radius:18px;
background:#00c6ff;
color:white;
cursor:pointer;
font-size:13px;
}

.btn:hover{
background:#0096c7;
}

.quick{
margin-top:15px;
}

.quick button{
padding:7px 12px;
margin:3px;
border:none;
border-radius:15px;
font-size:12px;
cursor:pointer;
background:#6c5ce7;
color:white;
}

.footer{
margin-top:20px;
font-size:12px;
opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">Noor – GJIMT AI</div>

<div class="subtitle">
Say "Hello Noor" or tap the avatar
</div>

<div id="mic" class="ai-avatar" onclick="startListening()">
<img src="ai-lady-robot.png">
</div>

<div id="status" class="status">
Ready to help you
</div>

<div class="controls">
<button class="btn" onclick="pauseVoice()">Pause</button>
<button class="btn" onclick="playVoice()">Play</button>
<button class="btn" onclick="stopAssistant()">Stop</button>
</div>

<div class="quick">
<button onclick="askCourses()">Courses</button>
<button onclick="askAdmission()">Admissions</button>
<button onclick="askFees()">Fees</button>
<button onclick="askContact()">Contact</button>
</div>

<div class="footer">
Powered by GJIMT AI
</div>

</div>

<script>

const mic=document.getElementById("mic")
const status=document.getElementById("status")

let voices=[]
let languageMode="en"

/* Load voices */

speechSynthesis.onvoiceschanged=()=>{
voices=speechSynthesis.getVoices()
}

/* Speech Recognition */

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition
const recognition = new SpeechRecognition()

recognition.lang="en-IN"
recognition.interimResults=false

function startListening(){

speechSynthesis.cancel()

mic.classList.add("listening")
status.innerHTML="Listening..."

recognition.start()

}

/* Wake word */

recognition.onresult=function(event){

let question=event.results[0][0].transcript

if(question.toLowerCase().includes("hello noor")){

speak("Hello, how may I assist you today?")
return

}

processQuestion(question)

}

recognition.onend=function(){
mic.classList.remove("listening")
}

/* Process question */

function processQuestion(question){

let q=question.toLowerCase()

if(q.includes("hindi")){

languageMode="hi"
recognition.lang="hi-IN"

speak("अब मैं हिंदी में बात करूँगी")
return

}

if(q.includes("punjabi")){

languageMode="pa"
recognition.lang="pa-IN"

speak("ਹੁਣ ਮੈਂ ਪੰਜਾਬੀ ਵਿੱਚ ਗੱਲ ਕਰਾਂਗੀ")
return

}

if(q.includes("english")){

languageMode="en"
recognition.lang="en-IN"

speak("Now I will speak in English")
return

}

sendToAI(question)

}

/* AI Webhook */

async function sendToAI(question){

try{

const response=await fetch(
"https://aiprojectsgjimt.app.n8n.cloud/webhook/ai-kiosk",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({query:question})
})

const data=await response.json()

let reply=data.output || data.response || "Sorry I did not understand."

if(languageMode==="hi"){
reply=await translate(reply,"hi")
}

if(languageMode==="pa"){
reply=await translate(reply,"pa")
}

speak(reply)

}catch{

speak("Server connection problem.")

}

}

/* Translation */

async function translate(text,target){

try{

let url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${target}&dt=t&q=${encodeURIComponent(text)}`

let res=await fetch(url)
let data=await res.json()

let translated=""

data[0].forEach(item=>{
translated+=item[0]
})

return translated

}catch{

return text

}

}

/* Speak */

function speak(text){

speechSynthesis.cancel()

mic.classList.add("speaking")

const speech=new SpeechSynthesisUtterance(text)

speech.rate=0.95
speech.pitch=1.2

let voice

if(languageMode==="hi"){
speech.lang="hi-IN"
voice=voices.find(v=>v.lang==="hi-IN")
}

else if(languageMode==="pa"){
speech.lang="pa-IN"
voice=voices.find(v=>v.lang==="pa-IN")
}

else{
speech.lang="en-IN"
voice=voices.find(v=>v.lang==="en-IN")
}

if(!voice){
voice=voices[0]
}

speech.voice=voice

speech.onend=()=>{
mic.classList.remove("speaking")
status.innerHTML="Ready to help you"
}

speechSynthesis.speak(speech)

status.innerHTML="Speaking..."

}

/* Quick buttons */

function askCourses(){sendToAI("What courses are available at GJIMT")}
function askAdmission(){sendToAI("Tell me about admissions at GJIMT")}
function askFees(){sendToAI("Tell me about fees structure at GJIMT")}
function askContact(){sendToAI("Give contact details of GJIMT")}

/* Controls */

function pauseVoice(){
speechSynthesis.pause()
status.innerHTML="Voice paused"
}

function playVoice(){
speechSynthesis.resume()
status.innerHTML="Voice resumed"
}

function stopAssistant(){

speechSynthesis.cancel()
recognition.abort()

mic.classList.remove("listening")
mic.classList.remove("speaking")

status.innerHTML="Ready for next question"

}

</script>

</body>
</html>
