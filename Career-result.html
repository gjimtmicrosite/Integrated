<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    overflow-x:hidden;
}

/* =========================
   BACKGROUND GLOW
========================= */

body::before{
    content:"";
    position:fixed;
    width:450px;
    height:450px;
    background:radial-gradient(circle,#00f2ff,transparent);
    top:-120px;
    left:-120px;
    filter:blur(140px);
    z-index:-1;
}

body::after{
    content:"";
    position:fixed;
    width:450px;
    height:450px;
    background:radial-gradient(circle,#ff00c8,transparent);
    bottom:-120px;
    right:-120px;
    filter:blur(140px);
    z-index:-1;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    top:0;
    left:0;

    background:rgba(255,255,255,0.06);

    backdrop-filter:blur(18px);

    border-right:1px solid rgba(255,255,255,0.1);

    padding:25px 18px;

    z-index:1000;
}

.sidebar h2{
    color:#ffd700;
    margin-bottom:25px;
    font-size:24px;
}

.sidebar button{
    width:100%;
    margin:10px 0;
    padding:13px;

    border:none;
    border-radius:14px;

    background:rgba(255,255,255,0.1);

    color:white;

    font-size:15px;
    font-weight:500;

    cursor:pointer;

    transition:0.3s;
}

.sidebar button:hover{
    background:#ffd700;
    color:#000;
    transform:translateX(5px) scale(1.02);
}

/* =========================
   MAIN CONTENT
========================= */

.main-content{
    margin-left:260px;
    padding:25px;
}

/* =========================
   HEADER
========================= */

.header{
    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border-radius:20px;

    padding:22px;

    text-align:center;

    font-size:28px;
    font-weight:700;

    margin-bottom:25px;

    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* =========================
   STATS
========================= */

.stats{
    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

    margin-bottom:25px;
}

.stat-card{
    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border-radius:20px;

    padding:22px;

    text-align:center;

    box-shadow:0 10px 25px rgba(0,0,0,0.3);

    transition:0.3s;
}

.stat-card:hover{
    transform:translateY(-6px) scale(1.02);
}

.stat-card div:first-child{
    font-size:15px;
    opacity:0.85;
    margin-bottom:10px;
}

.stat-card div:last-child{
    font-size:32px;
    font-weight:700;
    color:#ffd700;
}

/* =========================
   TABLE CARD
========================= */

.card{
    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border-radius:22px;

    padding:20px;

    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

/* =========================
   SEARCH BOX
========================= */

.search-box{
    display:flex;
    gap:12px;
    flex-wrap:wrap;

    margin-bottom:20px;
}

.search-box input{
    flex:1;
    min-width:250px;

    padding:12px;

    border:none;
    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,0.12);

    color:white;
}

.search-box input::placeholder{
    color:#ddd;
}

.search-box button{
    padding:12px 18px;

    border:none;
    border-radius:12px;

    background:linear-gradient(45deg,#667eea,#764ba2);

    color:white;

    cursor:pointer;

    font-weight:600;

    transition:0.3s;
}

.search-box button:hover{
    transform:scale(1.05);
}

/* =========================
   TABLE
========================= */

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:1000px;
}

th{
    background:rgba(255,255,255,0.15);

    padding:14px;

    color:#ffd700;

    font-size:14px;
}

td{
    padding:12px;
    text-align:center;

    border-bottom:1px solid rgba(255,255,255,0.08);

    font-size:14px;
}

tr:hover{
    background:rgba(255,255,255,0.05);
}

/* =========================
   BADGES
========================= */

.badge{
    padding:6px 10px;
    border-radius:8px;
    color:white;
    font-size:12px;
    font-weight:600;
}

.blue{
    background:#2196f3;
}

.green{
    background:#28a745;
}

.orange{
    background:#ff9800;
}

/* =========================
   LOADER
========================= */

#loader{
    text-align:center;
    padding:30px;
    font-size:18px;
    color:#ffd700;
}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }

    .main-content{
        margin-left:0;
        padding:15px;
    }

    .header{
        font-size:22px;
    }

    .search-box{
        flex-direction:column;
    }

    .search-box input{
        min-width:100%;
    }

}

</style>
</head>

<body>

<!-- =========================
     SIDEBAR
========================= -->

<div class="sidebar">

    <h2>📊 Dashboard</h2>

    <a href="dashboard.html">
        <button>🏠 Main Dashboard</button>
    </a>

    <a href="Career-result.html">
        <button>🎓 Career Quiz</button>
    </a>

    <a href="skillx-result.html">
        <button>💼 SkillX Quiz</button>
    </a>

    <button onclick="location.reload()">
        🔄 Refresh
    </button>

    <button onclick="goHome()">
        🚪 Logout
    </button>

</div>

<!-- =========================
     MAIN CONTENT
========================= -->

<div class="main-content">

    <div class="header">
        🚀 Career Test Analytics Dashboard
    </div>

    <!-- STATS -->

    <div class="stats">

        <div class="stat-card">
            <div>Total Students</div>
            <div id="total">0</div>
        </div>

        <div class="stat-card">
            <div>Top Career</div>
            <div id="domain">-</div>
        </div>

        <div class="stat-card">
            <div>Avg Score</div>
            <div id="avg">0</div>
        </div>

    </div>

    <!-- TABLE CARD -->

    <div class="card">

        <!-- SEARCH -->

        <div class="search-box">

            <input
                type="text"
                id="search"
                placeholder="🔍 Search student..."
            >

            <button onclick="searchTable()">
                Search
            </button>

            <button onclick="resetTable()">
                Clear
            </button>

        </div>

        <!-- TABLE -->

        <div class="table-container">

            <div id="loader">
                ⏳ Loading Student Data...
            </div>

            <table id="dataTable" style="display:none;">

                <thead>

                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Stream</th>
                        <th>R</th>
                        <th>I</th>
                        <th>A</th>
                        <th>S</th>
                        <th>E</th>
                        <th>C</th>
                        <th>Top Career</th>
                        <th>Second</th>
                        <th>Third</th>
                    </tr>

                </thead>

                <tbody id="tableBody"></tbody>

            </table>

        </div>

    </div>

</div>

<script>

/* =========================
   GOOGLE SHEET URL
========================= */

const sheetURL =
"https://opensheet.elk.sh/1jNv8d_espnJk8TqeosoXb01rT3dNbpG2auKHMYxXpQw/Sheet1";

/* =========================
   FETCH DATA
========================= */

fetch(sheetURL)

.then(res => res.json())

.then(data => {

    document.getElementById("loader").style.display = "none";

    document.getElementById("dataTable").style.display = "table";

    let total = data.length;

    let careerCount = {};

    let totalScore = 0;

    let bodyHTML = "";

    data.forEach(row => {

        let R = Number(row["R"]) || 0;
        let I = Number(row["I"]) || 0;
        let A = Number(row["A"]) || 0;
        let S = Number(row["S"]) || 0;
        let E = Number(row["E"]) || 0;
        let C = Number(row["C"]) || 0;

        let avgScore = (R+I+A+S+E+C)/6;

        totalScore += avgScore;

        let top = row["Top Career"] || "-";
        let second = row["Second"] || "-";
        let third = row["Third"] || "-";

        careerCount[top] =
        (careerCount[top] || 0) + 1;

        bodyHTML += `

        <tr>

            <td>${row["Name"] || "-"}</td>

            <td>${row["phone"] || "-"}</td>

            <td>${row["stream"] || "-"}</td>

            <td>${R}</td>
            <td>${I}</td>
            <td>${A}</td>
            <td>${S}</td>
            <td>${E}</td>
            <td>${C}</td>

            <td>
              <span class="badge blue">
                ${top}
              </span>
            </td>

            <td>
              <span class="badge green">
                ${second}
              </span>
            </td>

            <td>
              <span class="badge orange">
                ${third}
              </span>
            </td>

        </tr>

        `;

    });

    document.getElementById("tableBody").innerHTML =
    bodyHTML;

    document.getElementById("total").innerText =
    total;

    let topCareer =
    Object.keys(careerCount)
    .reduce((a,b)=>
      careerCount[a] > careerCount[b] ? a : b
    );

    document.getElementById("domain").innerText =
    topCareer;

    document.getElementById("avg").innerText =
    (totalScore / total).toFixed(1);

})

.catch(error => {

    document.getElementById("loader").innerHTML =
    "❌ Failed to load data";

    console.error(error);

});

/* =========================
   SEARCH
========================= */

function searchTable(){

    let input =
    document.getElementById("search")
    .value.toLowerCase();

    let rows =
    document.querySelectorAll("#tableBody tr");

    rows.forEach(row => {

        let text =
        row.innerText.toLowerCase();

        row.style.display =
        text.includes(input)
        ? ""
        : "none";

    });

}

/* =========================
   RESET SEARCH
========================= */

function resetTable(){

    document.getElementById("search").value = "";

    searchTable();

}

/* =========================
   HOME
========================= */

function goHome(){

    window.location.href =
    "https://gjimtmicrosite.github.io/Integrated/";

}

</script>

</body>
</html>
