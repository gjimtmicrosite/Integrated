<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Poppins', sans-serif;
    display: flex;
    background: linear-gradient(135deg, #eef2f3, #dfe9f3);
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    background: rgba(2, 44, 112);
    backdrop-filter: blur(20px);
    padding: 20px;
    color: white;
}

.sidebar h2 {
    color: #d4af37;
    margin-bottom: 20px;
}

.sidebar button {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: #fff;
    cursor: pointer;
}

.sidebar button:hover {
    background: #d4af37;
    color: #000;
}

/* MAIN */
.main-content {
    margin-left: 260px;
    width: 100%;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 22px;
}

/* STATS */
.stats {
    display: flex;
    gap: 15px;
    padding: 15px;
    flex-wrap: wrap;
}

.stat-card {
    flex: 1;
    min-width: 150px;
    background: rgba(255,255,255,0.7);
    border-radius: 12px;
    padding: 15px;
    text-align: center;
}

/* CARD */
.card {
    margin: 15px;
    background: rgba(255,255,255,0.85);
    border-radius: 15px;
    padding: 15px;
}

/* SEARCH BOX */
.search-box {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.search-box input {
    padding: 10px;
    width: 250px;
    border-radius: 8px;
    border: none;
}

.search-box button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #667eea;
    color: white;
}

.search-box button:hover {
    background: #5a67d8;
}

/* TABLE */
.table-container { overflow-x: auto; }

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #667eea;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    text-align: center;
}

tr:nth-child(even) { background: #f8f9ff; }

/* BADGE */
.badge {
    padding: 4px 8px;
    border-radius: 6px;
    color: white;
}

.blue { background: #2196f3; }
.green { background: #28a745; }
.orange { background: #ff9800; }

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>📊 Dashboards</h2>
    <a href="Career-result.html"><button>🎓 Career Quiz</button></a>
    <a href="skillx-result.html"><button>💼 SkillX Quiz</button></a>
  <button onclick="goHome()">🏠 Back to Home</button>
<button onclick="showHome()">🔓 Logout</button>
</div>

<!-- MAIN -->
<div class="main-content">

<div class="header">🎓 Career Test Dashboard</div>

<div class="stats">
    <div class="stat-card">
        <div>Total Students</div>
        <div id="total">0</div>
    </div>
    <div class="stat-card">
        <div>Top Career</div>
        <div id="domain">-</div>
    </div>
    <div class="stat-card">
        <div>Avg Score</div>
        <div id="avg">0</div>
    </div>
</div>

<div class="card">

    <!-- 🔍 SEARCH UI -->
    <div class="search-box">
        <input type="text" id="search" placeholder="Search student...">
        <button onclick="searchTable()">Search</button>
        <button onclick="resetTable()">Clear</button>
    </div>

    <div class="table-container">
        <div id="loader">Loading...</div>

        <table id="dataTable" style="display:none;">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Stream</th>
                    <th>R</th>
                    <th>I</th>
                    <th>A</th>
                    <th>S</th>
                    <th>E</th>
                    <th>C</th>
                    <th>Top Career</th>
                    <th>Second</th>
                    <th>Third</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

</div>

<script>

const sheetURL = "https://opensheet.elk.sh/1jNv8d_espnJk8TqeosoXb01rT3dNbpG2auKHMYxXpQw/Sheet1";

fetch(sheetURL)
.then(res => res.json())
.then(data => {

    document.getElementById("loader").style.display = "none";
    document.getElementById("dataTable").style.display = "table";

    let total = data.length;
    let careerCount = {};
    let totalScore = 0;
    let bodyHTML = "";

    data.forEach(row => {

        let R = Number(row["R"]) || 0;
        let I = Number(row["I"]) || 0;
        let A = Number(row["A"]) || 0;
        let S = Number(row["S"]) || 0;
        let E = Number(row["E"]) || 0;
        let C = Number(row["C"]) || 0;

        let avgScore = (R+I+A+S+E+C)/6;
        totalScore += avgScore;

        let top = row["Top Career"] || "-";
        let second = row["Second"] || "-";
        let third = row["Third"] || "-";

        careerCount[top] = (careerCount[top] || 0) + 1;

        bodyHTML += `<tr>
            <td>${row["Name"] || "-"}</td>
            <td>${row["phone"] || "-"}</td>
            <td>${row["stream"] || "-"}</td>
            <td>${R}</td>
            <td>${I}</td>
            <td>${A}</td>
            <td>${S}</td>
            <td>${E}</td>
            <td>${C}</td>
            <td><span class="badge blue">${top}</span></td>
            <td><span class="badge green">${second}</span></td>
            <td><span class="badge orange">${third}</span></td>
        </tr>`;
    });

    document.getElementById("tableBody").innerHTML = bodyHTML;

    document.getElementById("total").innerText = total;

    let topCareer = Object.keys(careerCount)
        .reduce((a,b)=> careerCount[a]>careerCount[b]?a:b);

    document.getElementById("domain").innerText = topCareer;

    document.getElementById("avg").innerText = (totalScore / total).toFixed(1);

});

// 🔍 SEARCH BUTTON FUNCTION
function searchTable() {
    let input = document.getElementById("search").value.toLowerCase();
    let rows = document.querySelectorAll("#tableBody tr");

    rows.forEach(row => {
        let text = row.innerText.toLowerCase();
        row.style.display = text.includes(input) ? "" : "none";
    });
}

// 🔄 CLEAR SEARCH
function resetTable() {
    document.getElementById("search").value = "";
    searchTable();
}

// HOME
function goHome() {
    window.location.href = "https://gjimtmicrosite.github.io/Integrated/";
}
function showHome() {
  window.location.href = "https://gjimtmicrosite.github.io/Integrated/dashboard.html";
}

</script>

</body>
</html>
