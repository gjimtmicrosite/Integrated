<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SkillX Result Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ===== BACKGROUND GLOW ===== */
body::before{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background:radial-gradient(circle,#00f2ff,transparent);
  top:-100px;
  left:-100px;
  filter:blur(150px);
}

body::after{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background:radial-gradient(circle,#ff00c8,transparent);
  bottom:-100px;
  right:-100px;
  filter:blur(150px);
}

  .no-underline {
    text-decoration: none;
    color: inherit; /* keeps normal text color */
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
} display:flex;}
.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    top:0;
    left:0;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(18px);
    border-right:1px solid rgba(255,255,255,0.1);
    padding:25px 18px;
    z-index:1000;
}
.sidebar h2{
    color:#ffd700;
    margin-bottom:25px;
    font-size:24px;
}
.sidebar button{
    width:100%;
    margin:10px 0;
    padding:13px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
    transition:0.3s;
}
.sidebar button:hover{
    background:#ffd700;
    color:#000;
    transform:translateX(5px) scale(1.02);
}
.menu{display:flex;flex-direction:column;gap:12px;}
.menu button{background:rgba(255,255,255,0.1);border:none;color:#fff;padding:12px;border-radius:10px;cursor:pointer;text-align:left;font-size:14px;transition:0.3s;}
.menu button:hover{background:rgba(255,255,255,0.25);}
.main-content{margin-left:240px;width:100%;}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px;text-align:center;font-size:22px;font-weight:600;}
.subhead{padding:14px 18px 0;font-size:15px;color:#333;font-weight:600;}
.stats{display:flex;gap:15px;padding:15px 18px;flex-wrap:wrap;}
.stat-card{flex:1;min-width:160px;background:rgba(255,255,255,0.8);border-radius:12px;padding:15px;box-shadow:0 8px 20px rgba(0,0,0,0.08);text-align:center;}
.stat-title{font-size:12px;color:#555;}
.stat-value{font-size:20px;font-weight:600;color:#333;}
.card{margin:15px 18px 18px;background:rgba(255,255,255,0.85);border-radius:15px;padding:15px;box-shadow:0 10px 25px rgba(0,0,0,0.1);}
.search-box{display:flex;justify-content:space-between;margin-bottom:15px;gap:10px;flex-wrap:wrap;}
.search-box input{padding:10px 12px;width:260px;border-radius:8px;border:none;outline:none;box-shadow:0 3px 10px rgba(0,0,0,0.08);}
.table-container{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{position:sticky;top:0;background:#667eea;color:#fff;padding:10px;font-size:12px;}
td{padding:10px;font-size:12px;text-align:center;}
tr:nth-child(even){background:#f8f9ff;}
tr:hover{background:#eef1ff;cursor:pointer;}
.name-link{color:#667eea;font-weight:500;}
.badge{padding:4px 8px;border-radius:6px;font-size:11px;color:#fff;}
.blue{background:#2196f3;}
.green{background:#28a745;}
.modal{display:none;position:fixed;z-index:999;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.6);}
.modal-content{background:rgba(255,255,255,0.95);margin:8% auto;padding:20px;width:90%;max-width:420px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.2);}
.close{float:right;font-size:20px;cursor:pointer;}
#pName{color:#667eea;font-weight:600;margin-bottom:10px;}
#pWorkshop{color:#9c27b0;font-weight:600;}
#loader{padding:12px;color:#444;}
@media(max-width:768px){
  body{flex-direction:column;}
  .sidebar{position:relative;width:100%;height:auto;}
  .main-content{margin-left:0;}
}
</style>
</head>
<body>

<div class="sidebar">

    <h2>📊 Dashboard</h2>

    <a href="dashboard.html">
        <button>🏠 Main Dashboard</button>
    </a>

    <a href="Career-result.html">
        <button>🎓 Career Quiz</button>
    </a>

    <a href="skillx-result.html">
        <button>💼 SkillX Quiz</button>
    </a>

    <button onclick="location.reload()">
        🔄 Refresh
    </button>

    <button onclick="goHome()">
        🚪 Logout
    </button>

</div>


<div class="main-content">
  <div class="header">🚀 SkillX Result Dashboardaa</div>
  <div class="subhead">Selected Workshop: <span id="selectedWorkshop">-</span></div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-title">Total Students</div>
      <div class="stat-value" id="total">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">Average Score</div>
      <div class="stat-value" id="avgScore">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">Average %</div>
      <div class="stat-value" id="avgPercent">0</div>
    </div>
  </div>

  <div class="card">
    <div class="search-box">
      <input type="text" id="search" placeholder="🔍 Search student..." onkeyup="searchTable()">
    </div>

    <div class="table-container">
      <div id="loader">Loading data...</div>
      <div id="errorBox" style="display:none;color:#d32f2f;padding:10px 0;"></div>
      <table id="dataTable" style="display:none;">
        <thead>
          <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Program</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Score</th>
            <th>Percentage</th>
            <th>Date-Time</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="popup" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closePopup()">&times;</span>
    <h3 id="pName"></h3>
    <p><b>Phone:</b> <span id="pPhone"></span></p>
    <p><b>Email:</b> <span id="pEmail"></span></p>
    <p><b>Program:</b> <span id="pProgram"></span></p>
    <p><b>Start Date:</b> <span id="pStart"></span></p>
    <p><b>End Date:</b> <span id="pEnd"></span></p>
    <p><b>Score:</b> <span id="pScore"></span></p>
    <p><b>Percentage:</b> <span id="pPercent"></span></p>
    <p><b>Workshop:</b> <span id="pWorkshop"></span></p>
  </div>
</div>

<script>
const sheetURL = "https://script.google.com/macros/s/AKfycbxmTZUh_QakBjTRUZBwp88co-6pyhDIcM9JDNvYMdjOZx5b1jgrRq68ppc7vR-_Vu55QA/exec";
const params = new URLSearchParams(window.location.search);
const workshop = params.get("workshop") || "";
let allRows = [];

document.getElementById("selectedWorkshop").innerText = workshop || "All Workshops";

fetch(sheetURL)
  .then(res => {
    if (!res.ok) throw new Error("Sheet request failed: " + res.status);
    return res.json();
  })
  .then(data => {
    allRows = Array.isArray(data) ? data : [];
    const filtered = workshop
      ? allRows.filter(row => String(row["Workshop Name"] || "").trim() === workshop.trim())
      : allRows;

    document.getElementById("loader").style.display = "none";
    document.getElementById("dataTable").style.display = "table";

    if (filtered.length === 0) {
      document.getElementById("tableBody").innerHTML = "";
      document.getElementById("loader").style.display = "block";
      document.getElementById("loader").innerText = "No data found for this workshop.";
      updateStats([]);
      return;
    }

    renderTable(filtered);
    updateStats(filtered);
  })
  .catch(err => {
    document.getElementById("loader").style.display = "none";
    document.getElementById("errorBox").style.display = "block";
    document.getElementById("errorBox").innerText = "Data load failed: " + err.message;
  });

function renderTable(rows){
  let html = "";
  rows.forEach((row, index) => {
    const safeRow = JSON.stringify(row).replace(/'/g, "\\'");
    html += `<tr onclick='showPopup(${safeRow})'>
      <td class="name-link">${row["Name"] || "-"}</td>
      <td>${row["Phone"] || "-"}</td>
      <td>${row["Email"] || "-"}</td>
      <td>${row["Program"] || "-"}</td>
      <td>${row["Start Date"] || "-"}</td>
      <td>${row["End Date"] || "-"}</td>
      <td><span class="badge blue">${row["Score"] || "-"}</span></td>
      <td><span class="badge green">${row["Percentage"] || "-"}</span></td>
      <td>${row["Date-Time"] || "-"}</td>
    </tr>`;
  });
  document.getElementById("tableBody").innerHTML = html;
  document.getElementById("total").innerText = rows.length;
}

function updateStats(rows){
  let scoreSum = 0, percentSum = 0, validScore = 0, validPercent = 0;

  rows.forEach(row => {
    const s = parseFloat(row["Score"]);
    const p = parseFloat(String(row["Percentage"] || "").replace("%",""));
    if (!isNaN(s)) { scoreSum += s; validScore++; }
    if (!isNaN(p)) { percentSum += p; validPercent++; }
  });

  document.getElementById("avgScore").innerText = validScore ? (scoreSum / validScore).toFixed(1) : "0";
  document.getElementById("avgPercent").innerText = validPercent ? (percentSum / validPercent).toFixed(1) + "%" : "0";
}

function searchTable() {
  const input = document.getElementById("search").value.toLowerCase();
  const rows = document.querySelectorAll("#tableBody tr");
  rows.forEach(row => {
    row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
  });
}

function showPopup(row){
  document.getElementById("popup").style.display = "block";
  document.getElementById("pName").innerText = row["Name"] || "-";
  document.getElementById("pPhone").innerText = row["Phone"] || "-";
  document.getElementById("pEmail").innerText = row["Email"] || "-";
  document.getElementById("pProgram").innerText = row["Program"] || "-";
  document.getElementById("pStart").innerText = row["Start Date"] || "-";
  document.getElementById("pEnd").innerText = row["End Date"] || "-";
  document.getElementById("pScore").innerText = row["Score"] || "-";
  document.getElementById("pPercent").innerText = row["Percentage"] || "-";
  document.getElementById("pWorkshop").innerText = row["Workshop Name"] || workshop || "-";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

function goDashboard() {
  window.location.href = "dashboard.html";
}

function goHome() {
  window.location.href = "https://gjimtmicrosite.github.io/Integrated/";
}
</script>

</body>
</html>
