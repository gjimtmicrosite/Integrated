<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillX Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    overflow-x:hidden;
}

/* =========================
   BACKGROUND GLOW
========================= */

body::before{
    content:"";
    position:fixed;
    width:450px;
    height:450px;
    background:radial-gradient(circle,#00f2ff,transparent);
    top:-120px;
    left:-120px;
    filter:blur(140px);
    z-index:-1;
}

body::after{
    content:"";
    position:fixed;
    width:450px;
    height:450px;
    background:radial-gradient(circle,#ff00c8,transparent);
    bottom:-120px;
    right:-120px;
    filter:blur(140px);
    z-index:-1;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    top:0;
    left:0;

    background:rgba(255,255,255,0.06);

    backdrop-filter:blur(18px);

    border-right:1px solid rgba(255,255,255,0.1);

    padding:25px 18px;

    z-index:1000;
}

.sidebar h2{
    color:#ffd700;
    margin-bottom:25px;
    font-size:24px;
    cursor:pointer;
}

.sidebar button{
    width:100%;
    margin:10px 0;
    padding:13px;

    border:none;
    border-radius:14px;

    background:rgba(255,255,255,0.1);

    color:white;

    font-size:15px;
    font-weight:500;

    cursor:pointer;

    transition:0.3s;
}

.sidebar button:hover{
    background:#ffd700;
    color:#000;
    transform:translateX(5px) scale(1.02);
}

/* =========================
   MAIN CONTENT
========================= */

.main-content{
    margin-left:260px;
    padding:25px;
}

/* =========================
   HEADER
========================= */

.header{
    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border-radius:20px;

    padding:22px;

    text-align:center;

    font-size:28px;
    font-weight:700;

    margin-bottom:25px;

    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* =========================
   STATS
========================= */

.stats{
    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

    margin-bottom:25px;
}

.stat-card{
    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border-radius:20px;

    padding:22px;

    text-align:center;

    box-shadow:0 10px 25px rgba(0,0,0,0.3);

    transition:0.3s;
}

.stat-card:hover{
    transform:translateY(-6px) scale(1.02);
}

.stat-title{
    font-size:15px;
    opacity:0.85;
    margin-bottom:10px;
}

.stat-value{
    font-size:32px;
    font-weight:700;
    color:#ffd700;
}

/* =========================
   TABLE CARD
========================= */

.card{
    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border-radius:22px;

    padding:20px;

    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

/* =========================
   SEARCH
========================= */

.search-box{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.search-box input{
    flex:1;
    min-width:250px;

    padding:12px;

    border:none;
    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,0.12);

    color:white;
}

.search-box input::placeholder{
    color:#ddd;
}

/* =========================
   TABLE
========================= */

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:1000px;
}

th{
    position:sticky;
    top:0;

    background:rgba(255,255,255,0.15);

    color:#ffd700;

    padding:14px;

    font-size:13px;
}

td{
    padding:12px;

    text-align:center;

    border-bottom:1px solid rgba(255,255,255,0.08);

    font-size:13px;
}

tr:hover{
    background:rgba(255,255,255,0.05);
}

/* =========================
   NAME LINK
========================= */

.name-link{
    color:#7dcfff;
    cursor:pointer;
    font-weight:600;
}

.name-link:hover{
    text-decoration:underline;
}

/* =========================
   BADGES
========================= */

.badge{
    padding:6px 10px;
    border-radius:8px;
    font-size:12px;
    color:white;
    font-weight:600;
}

.green{
    background:#28a745;
}

.orange{
    background:#ff9800;
}

.blue{
    background:#2196f3;
}

/* =========================
   LOADER
========================= */

.loader{
    text-align:center;
    padding:30px;
    font-size:18px;
    color:#ffd700;
}

/* =========================
   POPUP
========================= */

.modal{
    display:none;

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.7);

    z-index:9999;

    justify-content:center;
    align-items:center;

    padding:20px;
}

.modal.show{
    display:flex;
}

.modal-content{
    width:100%;
    max-width:420px;

    background:rgba(255,255,255,0.15);

    backdrop-filter:blur(25px);

    border-radius:25px;

    padding:28px;

    color:white;

    transform:scale(0.8);

    transition:0.3s;

    box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

.modal.show .modal-content{
    transform:scale(1);
}

.close{
    float:right;
    font-size:24px;
    cursor:pointer;
}

.modal-content h3{
    margin-bottom:20px;
    color:#ffd700;
}

.modal-content p{
    margin:12px 0;
    line-height:1.6;
}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }

    .main-content{
        margin-left:0;
        padding:15px;
    }

    .header{
        font-size:22px;
    }

    .search-box{
        flex-direction:column;
    }

    .search-box input{
        min-width:100%;
    }

}

</style>
</head>

<body>

<!-- =========================
     SIDEBAR
========================= -->

<div class="sidebar">

    <h2 onclick="location.href='dashboard.html'">
        📊 Dashboard
    </h2>

    <a href="dashboard.html">
        <button>🏠 Main Dashboard</button>
    </a>

    <a href="Career-result.html">
        <button>🎓 Career Quiz</button>
    </a>

    <a href="skillx-result.html">
        <button>💼 SkillX Quiz</button>
    </a>

    <button onclick="location.reload()">
        🔄 Refresh
    </button>

    <button onclick="goHome()">
        🚪 Logout
    </button>

</div>

<!-- =========================
     MAIN CONTENT
========================= -->

<div class="main-content">

    <div class="header">
        🚀 SkillX Smart Analytics Dashboard
    </div>

    <!-- STATS -->

    <div class="stats">

        <div class="stat-card">
            <div class="stat-title">
                Total Students
            </div>

            <div class="stat-value" id="total">
                0
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-title">
                Top Domain
            </div>

            <div class="stat-value" id="domain">
                -
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-title">
                Avg Score
            </div>

            <div class="stat-value" id="avg">
                0
            </div>
        </div>

    </div>

    <!-- TABLE CARD -->

    <div class="card">

        <div class="search-box">

            <input
                type="text"
                id="search"
                placeholder="🔍 Search student..."
                onkeyup="searchTable()"
            >

        </div>

        <div class="table-container">

            <div class="loader" id="loader">
                ⏳ Loading Student Data...
            </div>

            <table id="dataTable" style="display:none;">

                <thead>

                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Program</th>
                        <th>Stream</th>
                        <th>Maths</th>
                        <th>Digital</th>
                        <th>Comm</th>
                        <th>Business</th>
                        <th>Domain</th>
                        <th>Price</th>
                    </tr>

                </thead>

                <tbody id="tableBody"></tbody>

            </table>

        </div>

    </div>

</div>

<!-- =========================
     POPUP
========================= -->

<div id="popup" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closePopup()">
            ×
        </span>

        <h3 id="pName"></h3>

        <p>
            <b>Must Do:</b>
            <span id="pMust"></span>
        </p>

        <p>
            <b>Priority 2:</b>
            <span id="pP2"></span>
        </p>

        <p>
            <b>Priority 3:</b>
            <span id="pP3"></span>
        </p>

        <p>
            <b>Bundle Domain:</b>
            <span id="pDomain"></span>
        </p>

        <p>
            <b>Bundle Price:</b>
            ₹<span id="pPrice"></span>
        </p>

    </div>

</div>

<script>

/* =========================
   SHEET URL
========================= */

const sheetURL =
"https://opensheet.elk.sh/1KTjnVvWgT0MhFfT9kJenWgfWnFvE6TAncqxnhAuxytk/Sheet1";

/* =========================
   FETCH DATA
========================= */

fetch(sheetURL)

.then(res => res.json())

.then(data => {

    document.getElementById("loader").style.display =
    "none";

    if(!data || data.length === 0){

        document.getElementById("loader").innerText =
        "No Data Found";

        return;

    }

    document.getElementById("dataTable").style.display =
    "table";

    let total = data.length;

    let domainCount = {};

    let totalScore = 0;

    let bodyHTML = "";

    data.forEach(row => {

        let digital =
        Number(row["Digital Score"]) || 0;

        let comm =
        Number(row["Communication Score"]) || 0;

        let business =
        Number(row["Business Score"]) || 0;

        let avgScore =
        (digital + comm + business) / 3;

        totalScore += avgScore;

        let domain =
        row["Bundle Domain"] || "-";

        domainCount[domain] =
        (domainCount[domain] || 0) + 1;

        bodyHTML += `

        <tr>

            <td
              class="name-link"
              onclick='showPopup(${JSON.stringify(row)})'
            >
              ${row["Name"] || "-"}
            </td>

            <td>${row["Phone"] || "-"}</td>

            <td>${row["Program"] || "-"}</td>

            <td>${row["Stream"] || "-"}</td>

            <td>${row["Maths12"] || "-"}</td>

            <td>
              <span class="badge blue">
                ${digital}
              </span>
            </td>

            <td>
              <span class="badge green">
                ${comm}
              </span>
            </td>

            <td>
              <span class="badge orange">
                ${business}
              </span>
            </td>

            <td>${domain}</td>

            <td>
              ₹${row["Bundle Price"] || "-"}
            </td>

        </tr>

        `;

    });

    document.getElementById("tableBody").innerHTML =
    bodyHTML;

    document.getElementById("total").innerText =
    total;

    let topDomain =
    Object.keys(domainCount)
    .reduce((a,b)=>
      domainCount[a] > domainCount[b]
      ? a
      : b
    );

    document.getElementById("domain").innerText =
    topDomain;

    document.getElementById("avg").innerText =
    (totalScore / total).toFixed(1);

})

.catch(error => {

    document.getElementById("loader").innerHTML =
    "❌ Failed to load data";

    console.error(error);

});

/* =========================
   POPUP
========================= */

function showPopup(row){

    let modal =
    document.getElementById("popup");

    modal.classList.add("show");

    document.getElementById("pName").innerText =
    row["Name"];

    document.getElementById("pMust").innerText =
    row["Must Do"];

    document.getElementById("pP2").innerText =
    row["Priority 2"];

    document.getElementById("pP3").innerText =
    row["Priority 3"];

    document.getElementById("pDomain").innerText =
    row["Bundle Domain"];

    document.getElementById("pPrice").innerText =
    row["Bundle Price"];

}

function closePopup(){

    document.getElementById("popup")
    .classList.remove("show");

}

/* =========================
   SEARCH
========================= */

function searchTable(){

    let input =
    document.getElementById("search")
    .value.toLowerCase();

    let rows =
    document.querySelectorAll("#tableBody tr");

    rows.forEach(row => {

        let text =
        row.innerText.toLowerCase();

        row.style.display =
        text.includes(input)
        ? ""
        : "none";

    });

}

/* =========================
   HOME
========================= */

function goHome(){

    window.location.href =
    "https://gjimtmicrosite.github.io/Integrated/";

}

</script>

</body>
</html>
